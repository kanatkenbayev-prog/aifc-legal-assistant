name = "aifc-legal-proxy"
main = "index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[ai]
binding = "AI"

[[kv_namespaces]]
binding = "AIFC_KV"
id = "158cbdeedd144fe487699af26f1d9f9d"

[[vectorize]]
binding = "VECTORIZE"
index_name = "aifc-acts-v2"

# Мониторинг актов + Telegram-дайджест (03:00 UTC = 09:00 Алматы)
[triggers]
crons = ["0 3 * * *"]

