name = "aifc-legal-proxy"
main = "index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[ai]
binding = "AI"

[[kv_namespaces]]
binding = "AIFC_KV"
id = "158cbdeedd144fe487699af26f1d9f9d"

[[vectorize]]
binding = "VECTORIZE"
index_name = "aifc-acts"

# Ежедневный мониторинг изменений в актах МФЦА (06:00 UTC)
[triggers]
crons = ["0 6 * * *"]

# Опциональные секреты для Helicone аналитики (задать через wrangler secret put):
#   wrangler secret put HELICONE_KEY      ← API ключ с app.helicone.ai
#   wrangler secret put CF_ACCOUNT_ID     ← Cloudflare Account ID (дашборд → правая панель)
#   wrangler secret put CF_AI_TOKEN       ← Cloudflare API Token с разрешением Workers AI:Run
# Без них воркер работает в обычном режиме (native AI binding, без логирования).
